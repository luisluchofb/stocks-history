name: diastv-workflow
on:
  workflow_dispatch: {}          # piloto manual (P150.b)
  schedule:
    - cron: '30 21 * * 1-5'      # 21:30 UTC: post-cierre US todo el año
permissions:
  contents: write
concurrency:
  group: diastv-workflow
  cancel-in-progress: false
jobs:
  cierre:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: panel US mercado completo
        run: python producer_diastv.py america
      - name: commit
        run: |
          git config user.name "dias-tv-action"
          git config user.email "dias-tv-action@users.noreply.github.com"
          git add -A
          git commit -m "dias-tv: cierre $(date -u +%F)" || echo "sin cambios"
          git push
